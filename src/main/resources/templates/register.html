<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | iStore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f5f7 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            padding: 48px 40px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 460px;
            transition: transform 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .register-container:hover {
            transform: translateY(-2px);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1d1c1e 0%, #434344 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #86868b;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1d1c1e;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e8e8ed;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
            background: #fbfbfd;
        }

        input:focus {
            outline: none;
            border-color: #0071e3;
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        input.invalid {
            border-color: #ef4444;
        }

        .password-hint {
            font-size: 0.75rem;
            color: #86868b;
            margin-top: 6px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        button:hover {
            background: #0077ed;
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(0, 113, 227, 0.4);
        }

        .error {
            background: #fee2e2;
            color: #ef4444;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 24px;
            font-size: 14px;
            text-align: center;
            border-left: 4px solid #ef4444;
        }

        .login-link {
            text-align: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #e8e8ed;
            color: #86868b;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #0071e3;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="logo">
        <h1>Создать аккаунт</h1>
        <p>Присоединяйтесь к iStore</p>
    </div>

    <div th:if="${error}" class="error" th:text="${error}">Ошибка</div>

    <form action="/register" method="post" id="registerForm">
        <div class="form-group">
            <label>Логин *</label>
            <input type="text" name="login" id="login"
                   placeholder="минимум 3 символа" required minlength="3"
                   oninput="validateLogin()">
            <div class="password-hint" id="loginHint" style="color: #86868b;"></div>
        </div>

        <div class="form-group">
            <label>Пароль *</label>
            <input type="password" name="password" id="password"
                   placeholder="минимум 8 символов" required minlength="8"
                   oninput="validatePassword()">
            <div class="password-hint" id="passwordHint" style="color: #86868b;"></div>
        </div>

        <div class="form-group">
            <label>Телефон *</label>
            <input type="tel" name="phone" id="phone"
                   placeholder="+375291234567" required pattern="\+?[0-9]{10,15}"
                   oninput="validatePhone()">
            <div class="password-hint" id="phoneHint" style="color: #86868b;">Пример: +375291234567</div>
        </div>

        <button type="submit">Зарегистрироваться</button>
    </form>

    <div class="login-link">
        Уже есть аккаунт? <a href="/login">Войти</a>
    </div>
</div>

<script>
    function validateLogin() {
        const login = document.getElementById('login');
        const hint = document.getElementById('loginHint');
        if (login.value.length >= 3) {
            hint.innerHTML = '✓ Хорошо';
            hint.style.color = '#10b981';
            login.classList.remove('invalid');
        } else if (login.value.length > 0) {
            hint.innerHTML = '✗ Минимум 3 символа';
            hint.style.color = '#ef4444';
            login.classList.add('invalid');
        } else {
            hint.innerHTML = '';
            login.classList.remove('invalid');
        }
    }

    function validatePassword() {
        const password = document.getElementById('password');
        const hint = document.getElementById('passwordHint');
        if (password.value.length >= 8) {
            hint.innerHTML = '✓ Пароль надежный';
            hint.style.color = '#10b981';
            password.classList.remove('invalid');
        } else if (password.value.length > 0) {
            hint.innerHTML = '✗ Минимум 8 символов';
            hint.style.color = '#ef4444';
            password.classList.add('invalid');
        } else {
            hint.innerHTML = '';
            password.classList.remove('invalid');
        }
    }

    function validatePhone() {
        const phone = document.getElementById('phone');
        const hint = document.getElementById('phoneHint');
        const pattern = /^\+?[0-9]{10,15}$/;
        if (pattern.test(phone.value)) {
            hint.innerHTML = '✓ Формат верный';
            hint.style.color = '#10b981';
            phone.classList.remove('invalid');
        } else if (phone.value.length > 0) {
            hint.innerHTML = '✗ Формат: +375291234567';
            hint.style.color = '#ef4444';
            phone.classList.add('invalid');
        } else {
            hint.innerHTML = 'Пример: +375291234567';
            hint.style.color = '#86868b';
            phone.classList.remove('invalid');
        }
    }

    // Валидация перед отправкой
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const login = document.getElementById('login');
        const password = document.getElementById('password');
        const phone = document.getElementById('phone');
        const pattern = /^\+?[0-9]{10,15}$/;

        if (login.value.length < 3) {
            e.preventDefault();
            alert('Логин должен быть минимум 3 символа');
            return false;
        }

        if (password.value.length < 8) {
            e.preventDefault();
            alert('Пароль должен быть минимум 8 символов');
            return false;
        }

        if (!pattern.test(phone.value)) {
            e.preventDefault();
            alert('Введите корректный номер телефона (формат: +375291234567)');
            return false;
        }

        return true;
    });
</script>
</body>
</html>
