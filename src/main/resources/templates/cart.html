<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | iStore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #fbfbfd;
            color: #1d1c1e;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 113, 227, 0.03) 0%, transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(255, 45, 85, 0.03) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #000, #333);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: #1d1c1e;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.8;
        }

        .nav-links a:hover { opacity: 1; }

        .nav-icons {
            display: flex;
            gap: 1.8rem;
        }

        .nav-icons a {
            color: #1d1c1e;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .nav-icons a:hover { color: #0071e3; }

        .breadcrumb {
            max-width: 1280px;
            margin: 1.5rem auto 0;
            padding: 0 2rem;
            font-size: 0.9rem;
            color: #86868b;
        }
        .breadcrumb a {
            color: #0071e3;
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }

        .cart-grid {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 2rem;
        }

        .cart-items {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            overflow: auto;
        }

        .cart-items table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-items th {
            text-align: left;
            padding: 1.2rem;
            background: #f8f8fc;
            font-weight: 600;
            color: #1d1c1e;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-items td {
            padding: 1.2rem;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .product-img {
            width: 80px;
            height: 80px;
            background: #f5f5f7;
            border-radius: 16px;
            object-fit: contain;
            padding: 0.5rem;
        }
        .product-info strong {
            font-size: 1rem;
        }
        .product-info .specs {
            font-size: 0.8rem;
            color: #86868b;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .quantity-btn {
            width: 36px;
            height: 36px;
            border-radius: 30px;
            background: #f0f0f0;
            border: none;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .quantity-btn:hover { background: #e0e0e0; }
        .quantity-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .quantity-num {
            min-width: 40px;
            text-align: center;
            font-weight: 500;
            font-size: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-danger {
            background: #ff3b30;
            color: white;
        }
        .btn-danger:hover { background: #e0352a; }

        .cart-summary {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            height: fit-content;
        }
        .cart-summary h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .summary-row.total {
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
        }
        .delivery-free {
            color: #10b981;
            font-weight: 500;
        }
        .delivery-paid {
            color: #f59e0b;
            font-weight: 500;
        }
        .btn-checkout {
            display: block;
            width: 100%;
            background: #0071e3;
            color: white;
            text-align: center;
            padding: 0.9rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1.5rem;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-checkout:hover { background: #005bb5; }

        .empty-cart {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 24px;
            grid-column: 1 / -1;
        }

        .flash-message {
            max-width: 1280px;
            margin: 1rem auto 0;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            background: #1d1c1e;
            color: white;
            text-align: center;
        }
        .flash-message.success { background: #10b981; }
        .flash-message.error { background: #ef4444; }

        @media (max-width: 900px) {
            .cart-grid { grid-template-columns: 1fr; }
            .cart-items th { display: none; }
            .cart-items td { display: block; padding: 1rem; }
            .product-cell { justify-content: space-between; }
        }
    </style>
</head>
<body>
<div class="gradient-bg"></div>

<nav class="nav">
    <div class="nav-container">
        <a href="/" class="logo">iStore</a>
        <div class="nav-links">
            <a href="/category/iphone">iPhone</a>
            <a href="/category/mac">Mac</a>
            <a href="/category/ipad">iPad</a>
            <a href="/category/airpods">AirPods</a>
            <a href="/category/accessories">Аксессуары</a>
        </div>
        <div class="nav-icons">
            <a href="/search">🔍</a>
            <a href="/cart">🛒</a>
            <a href="/logout">🚪</a>
        </div>
    </div>
</nav>

<div class="breadcrumb">
    <a href="/">Главная</a> / <span>Корзина</span>
</div>

<div th:if="${message}" class="flash-message success" th:text="${message}"></div>
<div th:if="${error}" class="flash-message error" th:text="${error}"></div>

<div th:if="${cartItems != null and !cartItems.isEmpty()}" class="cart-grid">
    <div class="cart-items">
        <table>
            <thead>
            <tr>
                <th>Товар</th>
                <th>Цена</th>
                <th>Количество</th>
                <th>Сумма</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td>
                    <div class="product-cell">
                        <img class="product-img" th:if="${item.product.mainImage != null}" th:src="@{${item.product.mainImage.imageUrl}}" alt="product">
                        <img class="product-img" th:if="${item.product.mainImage == null}" src="/images/no-image.png" alt="No image">
                        <div class="product-info">
                            <strong th:text="${item.product.name}">iPhone 15 Pro</strong>
                            <div class="specs" th:if="${item.product.memory}" th:text="${item.product.memory}"></div>
                            <div class="specs" th:if="${item.product.color}" th:text="'Цвет: ' + ${item.product.color}"></div>
                        </div>
                    </div>
                </td>
                <td th:text="${#numbers.formatDecimal(item.product.price, 1, 2, 'COMMA')} + ' BYN'">1790 BYN</td>
                <td>
                    <div class="quantity-control">
                        <!-- Минус -->
                        <form th:action="@{/cart/update}" method="post" style="display: inline;">
                            <input type="hidden" name="cartItemId" th:value="${item.id}">
                            <input type="hidden" name="quantity" th:value="${item.quantity - 1}">
                            <button type="submit" class="quantity-btn" th:disabled="${item.quantity <= 1}">−</button>
                        </form>
                        <span class="quantity-num" th:text="${item.quantity}">1</span>
                        <!-- Плюс -->
                        <form th:action="@{/cart/update}" method="post" style="display: inline;">
                            <input type="hidden" name="cartItemId" th:value="${item.id}">
                            <input type="hidden" name="quantity" th:value="${item.quantity + 1}">
                            <button type="submit" class="quantity-btn">+</button>
                        </form>
                    </div>
                </td>
                <td th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 1, 2, 'COMMA')} + ' BYN'"></td>
                <td>
                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" name="cartItemId" th:value="${item.id}">
                        <button type="submit" class="btn btn-danger">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="cart-summary">
        <h2>Сумма заказа</h2>
        <div class="summary-row">
            <span>Товары (<span th:text="${cartItems.size()}">0</span>)</span>
            <span th:text="${#numbers.formatDecimal(total, 1, 2, 'COMMA')} + ' BYN'"></span>
        </div>
        <div class="summary-row">
            <span>Доставка по всей РБ</span>
            <span th:if="${total >= 1000}" class="delivery-free">Бесплатно</span>
            <span th:if="${total < 1000}" class="delivery-paid">30 BYN</span>
        </div>
        <div class="summary-row total">
            <span>Итого</span>
            <span th:if="${total >= 1000}" th:text="${#numbers.formatDecimal(total, 1, 2, 'COMMA')} + ' BYN'"></span>
            <span th:if="${total < 1000}" th:text="${#numbers.formatDecimal(total + 30, 1, 2, 'COMMA')} + ' BYN'"></span>
        </div>
        <a href="/checkout" class="btn-checkout">Оформить заказ</a>
    </div>
</div>

<div th:if="${cartItems == null or cartItems.isEmpty()}" class="empty-cart">
    <p>Ваша корзина пуста 😢</p>
    <a href="/" class="btn-checkout" style="display: inline-block; width: auto;">Перейти к покупкам</a>
</div>

<script>
    setTimeout(() => {
        const flash = document.querySelector('.flash-message');
        if (flash) flash.style.display = 'none';
    }, 3000);
</script>
</body>
</html>
