<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | iStore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f5f7 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 48px 40px;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 460px;
      transition: transform 0.3s ease;
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    .login-container:hover {
      transform: translateY(-2px);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1d1c1e 0%, #434344 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: #86868b;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #1d1c1e;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e8e8ed;
      border-radius: 14px;
      font-size: 16px;
      transition: all 0.3s;
      background: #fbfbfd;
    }

    input:focus {
      outline: none;
      border-color: #0071e3;
      background: white;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
      font-weight: normal;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .checkbox-group input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #0077ed;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -5px rgba(0, 113, 227, 0.4);
    }

    .error {
      background: #fee2e2;
      color: #ef4444;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 24px;
      font-size: 14px;
      text-align: center;
      border-left: 4px solid #ef4444;
    }

    .success {
      background: #e6f7e6;
      color: #10b981;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 24px;
      font-size: 14px;
      text-align: center;
      border-left: 4px solid #10b981;
    }

    .register-link {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #e8e8ed;
      color: #86868b;
      font-size: 0.9rem;
    }

    .register-link a {
      color: #0071e3;
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <h1>iStore</h1>
    <p>Превосходство в деталях</p>
  </div>

  <div th:if="${param.error}" class="error">
    Неверный логин или пароль
  </div>

  <div th:if="${param.registered}" class="success">
    Регистрация успешна! Войдите в аккаунт.
  </div>

  <form action="/login" method="post">
    <div class="form-group">
      <label>Логин</label>
      <input type="text" name="username" placeholder="Введите логин" required autofocus>
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="Введите пароль" required>
    </div>

    <div class="checkbox-group">
      <label>
        <input type="checkbox" name="remember-me" checked> Запомнить меня на 7 дней
      </label>
    </div>

    <button type="submit">Войти</button>
  </form>

  <div class="register-link">
    Нет аккаунта? <a href="/register">Зарегистрироваться</a>
  </div>
</div>
</body>
</html>
